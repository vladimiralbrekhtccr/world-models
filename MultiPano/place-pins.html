<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MultiPano · place camera pins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@400;500;700&family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --text:#111; --text-2:#3a3a3a; --text-3:#777;
  --accent:#7c3aed; --accent-bg:#faf5ff;
  --bg:#fff; --panel:#fbfbfd; --border:#e0e0e0; --code-bg:#f4f4f8;
  --green:#15803d; --red:#b91c1c;
  --font-body:'Literata',Georgia,serif;
  --font-ui:'DM Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
* { box-sizing: border-box; }
body { margin:0; background:var(--bg); color:var(--text);
       font-family:var(--font-ui); font-size:14px; line-height:1.55; }
a { color:var(--accent); text-decoration:none; }

.layout { display:grid; grid-template-columns: minmax(0,1fr) 320px;
          grid-template-rows: 46px 1fr; height:100vh; overflow:hidden; }

.topbar { grid-column: 1 / -1;
  display:flex; align-items:center; gap:10px; padding:0 14px;
  border-bottom:1px solid var(--border); background:var(--panel); font-size:13px; }
.topbar .brand { font-weight:700; color:var(--accent); font-size:14px; font-family:var(--font-body); }
.topbar .crumb a { color:var(--text-3); border-bottom:1px solid transparent; }
.topbar .crumb a:hover { color:var(--accent); }
.topbar .meta { color:var(--text-3); font-family:var(--font-mono); font-size:12px; }
.topbar .grow { flex:1; }
.topbar button {
  font-family:var(--font-ui); font-size:12px; font-weight:600;
  background:#fff; border:1px solid var(--border); border-radius:4px;
  padding:5px 12px; cursor:pointer; color:var(--text-2);
}
.topbar button.primary {
  background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700;
}
.topbar button.primary:hover { background:#6925d6; }
.topbar button.primary:disabled { background:#ccc; cursor:not-allowed; border-color:#ccc; }
.topbar button:not(.primary):hover { background:var(--accent-bg); color:var(--accent); border-color:var(--accent); }

.viewer { background:#23262e; overflow:auto; padding:18px;
          display:flex; align-items:center; justify-content:safe center; }
.map-wrap {
  position: relative; box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  background:#000; cursor: crosshair;
}
.map-wrap img { display:block; max-width: 100%; height: auto;
                pointer-events: none; user-select: none; -webkit-user-drag: none; }
.map-wrap.no-map {
  width: 480px; min-height: 240px; display:flex; align-items:center; justify-content:center;
  color:#888; font-style:italic; padding: 30px; text-align:center;
  border: 2px dashed #555; background:#1a1d29;
}

.pin {
  position: absolute; width: 30px; height: 30px;
  margin-left: -15px; margin-top: -30px;        /* tip of teardrop on the click point */
  background: var(--accent); color: #fff;
  font-family: var(--font-ui); font-weight: 700; font-size: 14px;
  border: 2px solid #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.45);
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  cursor: move; user-select: none;
}
.pin span { transform: rotate(45deg); display: block; }
.pin.selected { background: #e11d48; box-shadow: 0 0 0 3px rgba(225,29,72,0.35), 0 3px 10px rgba(0,0,0,0.45); }

.side {
  border-left:1px solid var(--border); background:var(--panel);
  display:flex; flex-direction:column; min-height:0; overflow:hidden;
}
.side h3 {
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px;
  color:var(--text-3); margin: 14px 18px 8px;
}
.side .pad { padding: 0 18px 14px; }

.scale-row { display:grid; grid-template-columns: 1fr 60px; gap:6px; align-items:center; }
.scale-row input {
  font-family:var(--font-mono); font-size:13px; padding:5px 8px;
  border:1px solid var(--border); border-radius:4px;
}
.scale-row input:focus { outline:none; border-color: var(--accent); }
.scale-row .unit { font-family:var(--font-mono); font-size:12px; color:var(--text-3); }
.scale-info {
  font-family:var(--font-mono); font-size:11.5px; color:var(--text-3);
  margin-top: 4px;
}

.pin-list { flex:1; overflow-y:auto; padding: 0 18px 14px; }
.pin-item {
  display:grid; grid-template-columns: 28px 1fr auto;
  gap: 8px; align-items:center;
  padding: 6px 8px; margin-bottom: 4px;
  border-radius: 4px; border: 1px solid var(--border); background:#fff;
}
.pin-item.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-bg); }
.pin-item .num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--accent); color:#fff;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
}
.pin-item .coords { font-family:var(--font-mono); font-size: 11.5px; color: var(--text-2); }
.pin-item .coords .m { color: var(--text-3); font-size: 10.5px; display: block; }
.pin-item .del {
  background:none; border:none; color: var(--text-3); cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 3px;
}
.pin-item .del:hover { color: var(--red); background:#fdecec; }
.pin-empty {
  color: var(--text-3); font-style: italic; padding: 10px 0;
}

.help {
  font-size: 12px; color: var(--text-3); line-height: 1.55;
  margin: 0 18px 12px; padding: 10px 12px;
  background: var(--code-bg); border-radius: 4px;
}
.help kbd {
  font-family: var(--font-mono); font-size: 10.5px;
  background: #fff; border: 1px solid var(--border); border-radius: 3px;
  padding: 1px 5px;
}

.status-bar {
  position: fixed; bottom: 0; left: 0; right: 0; padding: 6px 14px;
  background: rgba(0,0,0,0.85); color: #ddd; font-family: var(--font-mono);
  font-size: 11.5px; text-align: center;
  transform: translateY(100%); transition: transform 0.2s;
  z-index: 90;
}
.status-bar.show { transform: translateY(0); }
.status-bar.ok  { background: var(--green); color:#fff; }
.status-bar.err { background: var(--red);   color:#fff; }
</style>
</head>
<body>

<div class="layout">

  <header class="topbar">
    <span class="brand">place-pins</span>
    <span class="crumb"><a href="inputs.html">← inputs</a></span>
    <span class="meta" id="scene-name">— no scene —</span>
    <span class="grow"></span>
    <button id="reset-btn" title="Reload from saved poses.json (or clear)">↻ Reset</button>
    <button id="save-btn" class="primary" disabled>Save poses.json</button>
  </header>

  <main class="viewer" id="viewer">
    <div class="map-wrap no-map" id="map-wrap">
      Loading scene…
    </div>
  </main>

  <aside class="side">
    <h3>Scene scale</h3>
    <div class="pad">
      <div class="scale-row">
        <input type="number" id="scale-input" min="1" max="500" step="1" value="30">
        <span class="unit">metres wide</span>
      </div>
      <div class="scale-info" id="scale-info">— load a map —</div>
    </div>

    <h3>Camera pins</h3>
    <div class="help">
      <kbd>click</kbd> the map to drop a pin · <kbd>drag</kbd> to move ·
      <kbd>x</kbd> on a row to delete · <kbd>save</kbd> writes
      <code>input/&lt;scene&gt;/poses.json</code>.
    </div>
    <div class="pin-list" id="pin-list">
      <div class="pin-empty">No pins yet.</div>
    </div>
  </aside>

</div>

<div class="status-bar" id="status"></div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const scene = params.get('scene') || '';
  const sceneNameEl = document.getElementById('scene-name');
  const viewer = document.getElementById('viewer');
  const mapWrap = document.getElementById('map-wrap');
  const pinList = document.getElementById('pin-list');
  const scaleInput = document.getElementById('scale-input');
  const scaleInfo = document.getElementById('scale-info');
  const saveBtn = document.getElementById('save-btn');
  const resetBtn = document.getElementById('reset-btn');
  const statusBar = document.getElementById('status');

  let img = null;
  let imgW = 0, imgH = 0;
  // pins: array of { px, py, yaw_deg } in IMAGE-pixel coords (not display px)
  let pins = [];
  let selectedIdx = -1;
  let dragging = null; // { idx, offsetX, offsetY }

  function flash(msg, cls = '', ttl = 1800) {
    statusBar.textContent = msg;
    statusBar.className = 'status-bar show' + (cls ? ' ' + cls : '');
    clearTimeout(flash._t);
    flash._t = setTimeout(() => statusBar.classList.remove('show'), ttl);
  }

  if (!scene) {
    mapWrap.innerHTML = `
      <div>No scene specified. Open this page as
      <code>place-pins.html?scene=&lt;scene_name&gt;</code>
      or pick a scene from the
      <a href="inputs.html" style="color:#9ad;">inputs gallery</a>.</div>`;
    sceneNameEl.textContent = '—';
    return;
  }
  sceneNameEl.textContent = scene;
  document.title = 'MultiPano · place pins · ' + scene;

  async function init() {
    // 1. Load the map image
    const mapUrl = `input/${encodeURIComponent(scene)}/map.png?t=${Date.now()}`;
    img = new Image();
    img.src = mapUrl;
    try {
      await img.decode();
    } catch (e) {
      mapWrap.innerHTML = `
        <div>Couldn't load <code>${mapUrl}</code>.<br>
        Make sure <code>map.png</code> exists in this scene's folder.</div>`;
      return;
    }
    imgW = img.naturalWidth; imgH = img.naturalHeight;

    mapWrap.classList.remove('no-map');
    mapWrap.innerHTML = '';
    mapWrap.appendChild(img);

    mapWrap.addEventListener('click', onMapClick);
    mapWrap.addEventListener('mousedown', onPinMouseDown);
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup',   onMouseUp);

    // 2. Load existing poses.json (if any)
    try {
      const r = await fetch(`input/${encodeURIComponent(scene)}/poses.json?t=${Date.now()}`, {cache:'no-store'});
      if (r.ok) {
        const data = await r.json();
        if (data.scale_m_per_px && imgW) {
          scaleInput.value = Math.round(data.scale_m_per_px * imgW);
        }
        if (data.cameras) {
          for (const [k, v] of Object.entries(data.cameras)) {
            pins.push({ px: v.px, py: v.py, yaw_deg: v.yaw_deg || 0 });
          }
          flash('Loaded ' + pins.length + ' existing pin(s)');
        }
      }
    } catch (e) {}

    renderAll();
  }

  function onMapClick(e) {
    if (e.target.classList.contains('pin') || e.target.closest('.pin')) return;
    if (dragging) { dragging = null; return; }
    const {px, py} = displayToImage(e.clientX, e.clientY);
    if (px < 0 || py < 0 || px > imgW || py > imgH) return;
    pins.push({ px, py, yaw_deg: 0 });
    selectedIdx = pins.length - 1;
    renderAll();
  }

  function onPinMouseDown(e) {
    const p = e.target.closest('.pin');
    if (!p) return;
    e.preventDefault();
    const idx = parseInt(p.dataset.idx, 10);
    selectedIdx = idx;
    const rect = p.getBoundingClientRect();
    dragging = { idx, startedAt: Date.now(),
                 offsetX: e.clientX - (rect.left + rect.width/2),
                 offsetY: e.clientY - (rect.bottom) };  // bottom = pin tip
    renderAll();
  }
  function onMouseMove(e) {
    if (!dragging) return;
    const {px, py} = displayToImage(e.clientX - dragging.offsetX, e.clientY - dragging.offsetY);
    pins[dragging.idx].px = Math.max(0, Math.min(imgW, px));
    pins[dragging.idx].py = Math.max(0, Math.min(imgH, py));
    renderPins();
    renderList();
  }
  function onMouseUp(e) {
    // tiny drags = treat as click on pin (still selected, no move)
    if (dragging && (Date.now() - dragging.startedAt) < 150 &&
        Math.abs(e.movementX || 0) < 3 && Math.abs(e.movementY || 0) < 3) {
      // already selected on mousedown
    }
    setTimeout(() => { dragging = null; }, 0);   // let onMapClick suppress
  }

  function displayToImage(clientX, clientY) {
    const rect = img.getBoundingClientRect();
    const scaleX = imgW / rect.width;
    const scaleY = imgH / rect.height;
    return {
      px: Math.round((clientX - rect.left) * scaleX),
      py: Math.round((clientY - rect.top)  * scaleY),
    };
  }
  function imageToDisplay(px, py) {
    const rect = img.getBoundingClientRect();
    const parentRect = mapWrap.getBoundingClientRect();
    const scaleX = rect.width / imgW;
    const scaleY = rect.height / imgH;
    return {
      x: (rect.left - parentRect.left) + px * scaleX,
      y: (rect.top  - parentRect.top ) + py * scaleY,
    };
  }

  function renderAll() {
    renderPins();
    renderList();
    updateScaleInfo();
    saveBtn.disabled = !pins.length;
  }
  function renderPins() {
    mapWrap.querySelectorAll('.pin').forEach(p => p.remove());
    pins.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'pin' + (i === selectedIdx ? ' selected' : '');
      el.dataset.idx = i;
      const {x, y} = imageToDisplay(p.px, p.py);
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      el.innerHTML = '<span>' + (i + 1) + '</span>';
      mapWrap.appendChild(el);
    });
  }
  function renderList() {
    if (!pins.length) {
      pinList.innerHTML = '<div class="pin-empty">No pins yet — click the map to drop one.</div>';
      return;
    }
    const mpp = currentScale();
    pinList.innerHTML = '';
    pins.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'pin-item' + (i === selectedIdx ? ' selected' : '');
      const mx = (p.px * mpp).toFixed(2);
      const my = (p.py * mpp).toFixed(2);
      row.innerHTML = `
        <div class="num">${i + 1}</div>
        <div class="coords">
          (${p.px}, ${p.py}) px
          <span class="m">(${mx}, ${my}) m</span>
        </div>
        <button class="del" title="Delete">×</button>
      `;
      row.addEventListener('click', () => { selectedIdx = i; renderAll(); });
      row.querySelector('.del').addEventListener('click', e => {
        e.stopPropagation();
        pins.splice(i, 1);
        if (selectedIdx === i) selectedIdx = -1;
        else if (selectedIdx > i) selectedIdx -= 1;
        renderAll();
      });
      pinList.appendChild(row);
    });
  }
  function currentScale() {
    const widthM = Math.max(1, parseFloat(scaleInput.value) || 30);
    return widthM / Math.max(1, imgW);
  }
  function updateScaleInfo() {
    if (!imgW) { scaleInfo.textContent = '— load a map —'; return; }
    const mpp = currentScale();
    const cm = (mpp * 100).toFixed(2);
    scaleInfo.textContent = `1 px ≈ ${cm} cm  ·  map = ${imgW} × ${imgH} px`;
  }

  scaleInput.addEventListener('input', renderAll);
  addEventListener('resize', () => { renderPins(); });

  saveBtn.addEventListener('click', async () => {
    if (!pins.length) return;
    const mpp = currentScale();
    const cameras = {};
    pins.forEach((p, i) => {
      cameras[String(i + 1)] = { px: p.px, py: p.py, yaw_deg: p.yaw_deg || 0 };
    });
    const payload = {
      scale_m_per_px: mpp,
      world_north_in_image: 'up',
      cameras,
    };
    try {
      const r = await fetch(`poses?scene=${encodeURIComponent(scene)}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      flash('Saved ' + pins.length + ' pin(s) → poses.json', 'ok');
    } catch (e) {
      flash('Save failed: ' + e.message, 'err');
    }
  });

  resetBtn.addEventListener('click', async () => {
    if (pins.length && !confirm('Discard current pins and reload from disk?')) return;
    pins = []; selectedIdx = -1;
    renderAll();
    try {
      const r = await fetch(`input/${encodeURIComponent(scene)}/poses.json?t=${Date.now()}`, {cache:'no-store'});
      if (r.ok) {
        const data = await r.json();
        if (data.scale_m_per_px && imgW) {
          scaleInput.value = Math.round(data.scale_m_per_px * imgW);
        }
        for (const [k, v] of Object.entries(data.cameras || {})) {
          pins.push({ px: v.px, py: v.py, yaw_deg: v.yaw_deg || 0 });
        }
        flash('Reloaded ' + pins.length + ' pin(s) from disk');
      } else {
        flash('No saved poses.json');
      }
    } catch (e) { flash('Reload failed: ' + e.message, 'err'); }
    renderAll();
  });

  init();
})();
</script>
</body>
</html>
