<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MultiPano · inputs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@400;500;700&family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --text: #111; --text-2: #3a3a3a; --text-3: #777;
  --accent: #7c3aed; --accent-bg: #faf5ff;
  --bg: #fff; --border: #e0e0e0; --code-bg: #f4f4f8;
  --green: #15803d; --green-bg: #f0fdf4;
  --red: #b91c1c; --red-bg: #fef2f2;
  --font-body: 'Literata', Georgia, serif;
  --font-ui:   'DM Sans', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--text);
  font-family: var(--font-ui); font-size: 14.5px; line-height: 1.55;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.layout { display: grid; grid-template-columns: 260px minmax(0, 1fr); height: 100vh; }
.scenes-side {
  border-right: 1px solid var(--border); background: #fbfbfd;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.scenes-side .crumbs {
  font-size: 12px; color: var(--text-3); padding: 16px 18px 8px;
  border-bottom: 1px solid var(--border);
}
.scenes-side .crumbs a { color: var(--text-3); }
.scenes-side .crumbs a:hover { color: var(--accent); }
.scenes-side h2 {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-3); margin: 14px 18px 8px;
}
.scene-list { flex: 1; overflow-y: auto; padding: 0 8px; min-height: 0; }
.scene-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px; margin: 2px 0; border-radius: 4px;
  cursor: pointer; color: var(--text-2); font-size: 13.5px;
  border-left: 2px solid transparent;
}
.scene-item:hover { background: #eee; }
.scene-item.active { background: var(--accent-bg); color: var(--accent);
  border-left-color: var(--accent); font-weight: 600; }
.scene-item .count {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
}
.scene-item.active .count { color: var(--accent); }
.scenes-side .new-scene {
  border-top: 1px solid var(--border); padding: 12px 16px;
  display: flex; gap: 6px;
}
.new-scene input {
  flex: 1; font-family: var(--font-ui); font-size: 13px;
  padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
}
.new-scene input:focus { outline: none; border-color: var(--accent); }
.new-scene button {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  background: var(--accent); color: #fff; border: none;
  padding: 0 14px; border-radius: 4px; cursor: pointer;
}
.new-scene button:hover { background: #6925d6; }
.new-scene button:disabled { background: #ccc; cursor: not-allowed; }

.main { overflow-y: auto; padding: 22px 28px 40px; }
.main-header {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px; margin-bottom: 18px; flex-wrap: wrap;
}
.main-header h1 {
  font-family: var(--font-body); font-size: 24px; font-weight: 700;
  margin: 0; word-break: break-all;
}
.main-header .meta {
  font-family: var(--font-mono); font-size: 12px; color: var(--text-3);
}

.drop-zone {
  border: 2px dashed var(--border); border-radius: 8px;
  padding: 32px 20px; text-align: center; cursor: pointer;
  color: var(--text-3); font-size: 14px; background: #fafbfe;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 22px;
}
.drop-zone:hover, .drop-zone.dragging {
  border-color: var(--accent); background: var(--accent-bg);
  color: var(--accent);
}
.drop-zone strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 15px; }
.drop-zone .small { font-size: 12px; color: var(--text-3); margin-top: 4px; }

.upload-progress {
  margin: 8px 0 18px; font-size: 12.5px; color: var(--text-2);
  font-family: var(--font-mono);
}
.upload-progress .pg-row {
  display: flex; justify-content: space-between;
  padding: 4px 0; border-bottom: 1px dotted #eee;
}
.upload-progress .pg-row.ok { color: var(--green); }
.upload-progress .pg-row.err { color: var(--red); }

.thumb-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
.thumb {
  background: #fafbfe; border: 1px solid var(--border); border-radius: 6px;
  overflow: hidden; cursor: zoom-in; position: relative; margin: 0;
  transition: border-color 0.15s, transform 0.15s;
}
.thumb:hover { border-color: var(--accent); transform: translateY(-1px); }
.thumb .img-wrap {
  width: 100%; aspect-ratio: 1 / 1; background: #1a1d29;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.thumb .img-wrap img { display: block; width: 100%; height: 100%; object-fit: cover; }
.thumb figcaption {
  padding: 7px 10px; font-size: 11.5px; font-family: var(--font-mono);
  color: var(--text-2); display: flex; justify-content: space-between;
  border-top: 1px solid var(--border); background: #fff;
}
.thumb .filename { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 65%; }
.thumb .size { color: var(--text-3); }
.thumb .del-btn {
  position: absolute; top: 6px; right: 6px;
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 11px; font-weight: 700; line-height: 1;
  border: none; padding: 4px 7px; border-radius: 3px; cursor: pointer;
  opacity: 0; transition: opacity 0.15s;
}
.thumb:hover .del-btn { opacity: 1; }
.thumb .del-btn:hover { background: var(--red); }

.empty-state {
  border: 1px dashed var(--border); border-radius: 8px;
  padding: 40px 20px; text-align: center; color: var(--text-3);
  font-style: italic;
}

/* Lightbox */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 30px;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
.lightbox .lb-meta {
  position: absolute; bottom: 16px; left: 16px; right: 16px;
  color: #ddd; font-family: var(--font-mono); font-size: 13px;
  text-align: center;
}
.lightbox .lb-close {
  position: absolute; top: 16px; right: 18px; color: #fff;
  font-size: 24px; cursor: pointer; background: none; border: none;
}

.status-bar {
  position: fixed; bottom: 0; left: 0; right: 0; padding: 6px 14px;
  background: rgba(0,0,0,0.85); color: #ddd; font-family: var(--font-mono); font-size: 11.5px;
  text-align: center; transform: translateY(100%); transition: transform 0.2s;
  z-index: 90;
}
.status-bar.show { transform: translateY(0); }
.status-bar.ok { background: var(--green); color: #fff; }
.status-bar.err { background: var(--red); color: #fff; }

@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; height: auto; }
  .scenes-side { border-right: none; border-bottom: 1px solid var(--border); }
  .scene-list { max-height: 240px; }
}
</style>
</head>
<body>

<div class="layout">

  <aside class="scenes-side">
    <div class="crumbs">
      <a href="index.html">← MultiPano doc</a>
    </div>
    <h2>Scenes</h2>
    <div class="scene-list" id="scene-list">
      <div style="padding: 12px; color: var(--text-3); font-size: 12.5px; font-style: italic;">loading…</div>
    </div>
    <div class="new-scene">
      <input id="new-scene-name" placeholder="new_scene_name" autocomplete="off">
      <button id="new-scene-btn">+ Add</button>
    </div>
  </aside>

  <main class="main">
    <div id="main-content">
      <div class="empty-state">No scene selected. Create one on the left.</div>
    </div>
  </main>

</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">×</button>
  <img id="lb-img" alt="">
  <div class="lb-meta" id="lb-meta"></div>
</div>

<div class="status-bar" id="status"></div>

<script>
(function () {
  const sceneList   = document.getElementById('scene-list');
  const mainContent = document.getElementById('main-content');
  const newSceneIn  = document.getElementById('new-scene-name');
  const newSceneBtn = document.getElementById('new-scene-btn');
  const lightbox    = document.getElementById('lightbox');
  const lbImg       = document.getElementById('lb-img');
  const lbMeta      = document.getElementById('lb-meta');
  const lbClose     = document.getElementById('lb-close');
  const statusBar   = document.getElementById('status');

  let scenes = [];
  let activeScene = localStorage.getItem('multipano-active-scene') || null;

  // ── helpers ──────────────────────────────────────────────────────
  function flashStatus(msg, cls = '', ttl = 2200) {
    statusBar.textContent = msg;
    statusBar.className = 'status-bar show' + (cls ? ' ' + cls : '');
    clearTimeout(flashStatus._t);
    flashStatus._t = setTimeout(() => statusBar.classList.remove('show'), ttl);
  }
  function bytes(n) {
    if (n < 1024) return n + ' B';
    if (n < 1024*1024) return (n/1024).toFixed(0) + ' KB';
    return (n/1024/1024).toFixed(1) + ' MB';
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function busted(url) { return url + '?t=' + Date.now(); }

  // ── load scenes from server ─────────────────────────────────────
  async function loadScenes() {
    try {
      const r = await fetch('/list', {cache: 'no-store'});
      if (!r.ok) throw new Error('list failed: ' + r.status);
      const data = await r.json();
      scenes = data.scenes || [];
    } catch (e) {
      scenes = [];
      let msg;
      if (location.protocol === 'file:') {
        msg = 'You opened this via file:// — uploads need the server. Visit http://localhost:8765/inputs.html instead (start serve.py + port-forward).';
      } else {
        msg = 'Server unreachable at ' + location.origin + ' — start serve.py on the cluster and check your port-forward. (' + e.message + ')';
      }
      flashStatus(msg, 'err', 10000);
      // Also paint the empty state with the same hint, since flash toasts auto-dismiss
      mainContent.innerHTML = '<div class="empty-state" style="text-align:left; line-height:1.7;"><strong>' + escapeHtml(msg) + '</strong></div>';
    }
    if (activeScene && !scenes.find(s => s.name === activeScene)) {
      activeScene = null;
    }
    if (!activeScene && scenes.length) activeScene = scenes[0].name;
    renderScenes();
    renderMain();
  }

  function renderScenes() {
    if (!scenes.length) {
      sceneList.innerHTML = '<div style="padding: 12px; color: var(--text-3); font-size: 12.5px; font-style: italic;">No scenes yet. Create one below.</div>';
      return;
    }
    sceneList.innerHTML = '';
    scenes.forEach(s => {
      const el = document.createElement('div');
      el.className = 'scene-item' + (s.name === activeScene ? ' active' : '');
      el.innerHTML = `<span>${escapeHtml(s.name)}</span><span class="count">${s.images.length}</span>`;
      el.addEventListener('click', () => {
        activeScene = s.name;
        localStorage.setItem('multipano-active-scene', activeScene);
        renderScenes();
        renderMain();
      });
      sceneList.appendChild(el);
    });
  }

  function renderMain() {
    if (!activeScene) {
      mainContent.innerHTML = '<div class="empty-state">No scene selected. Create one on the left.</div>';
      return;
    }
    const s = scenes.find(x => x.name === activeScene);
    if (!s) {
      mainContent.innerHTML = '<div class="empty-state">Scene not found.</div>';
      return;
    }
    const totalBytes = s.images.reduce((a, b) => a + b.size, 0);
    mainContent.innerHTML = `
      <div class="main-header">
        <h1>${escapeHtml(s.name)}</h1>
        <div class="meta">${s.images.length} image${s.images.length===1?'':'s'} · ${bytes(totalBytes)} · input/${escapeHtml(s.name)}/</div>
      </div>
      <div class="drop-zone" id="drop-zone">
        <strong>Drop images here</strong>
        <div>or click to choose files</div>
        <div class="small">PNG · JPG · WEBP — uploaded to MultiPano/input/${escapeHtml(s.name)}/</div>
        <input type="file" id="file-input" multiple accept="image/png,image/jpeg,image/webp" style="display:none">
      </div>
      <div class="upload-progress" id="upload-progress"></div>
      <div class="thumb-grid" id="thumb-grid"></div>
    `;
    renderThumbs(s);
    wireDropZone();
  }

  function renderThumbs(scene) {
    const grid = document.getElementById('thumb-grid');
    if (!scene.images.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">No images yet. Drop some in the area above.</div>';
      return;
    }
    grid.innerHTML = '';
    scene.images.forEach(img => {
      const fig = document.createElement('figure');
      fig.className = 'thumb';
      fig.innerHTML = `
        <div class="img-wrap"><img loading="lazy" src="${escapeHtml(img.url)}" alt="${escapeHtml(img.filename)}"></div>
        <figcaption>
          <span class="filename" title="${escapeHtml(img.filename)}">${escapeHtml(img.filename)}</span>
          <span class="size">${bytes(img.size)}</span>
        </figcaption>
        <button class="del-btn" title="Delete">✕</button>
      `;
      fig.querySelector('img').addEventListener('click', () => openLightbox(img));
      fig.querySelector('.del-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`Delete ${img.filename}?`)) return;
        try {
          const r = await fetch(`/image?scene=${encodeURIComponent(scene.name)}&file=${encodeURIComponent(img.filename)}`, {method: 'DELETE'});
          if (!r.ok) throw new Error(r.status);
          flashStatus('Deleted ' + img.filename, 'ok');
          await loadScenes();
        } catch (err) {
          flashStatus('Delete failed: ' + err, 'err');
        }
      });
      grid.appendChild(fig);
    });
  }

  // ── drop zone ────────────────────────────────────────────────────
  function wireDropZone() {
    const dz = document.getElementById('drop-zone');
    const fi = document.getElementById('file-input');
    if (!dz || !fi) return;

    dz.addEventListener('click', e => {
      if (e.target.tagName !== 'INPUT') fi.click();
    });
    fi.addEventListener('change', () => handleFiles(fi.files));

    ['dragenter','dragover'].forEach(ev => {
      dz.addEventListener(ev, e => {
        e.preventDefault(); e.stopPropagation();
        dz.classList.add('dragging');
      });
    });
    ['dragleave','drop'].forEach(ev => {
      dz.addEventListener(ev, e => {
        e.preventDefault(); e.stopPropagation();
        if (ev === 'drop' || e.target === dz) dz.classList.remove('dragging');
      });
    });
    dz.addEventListener('drop', e => {
      const files = e.dataTransfer?.files;
      if (files && files.length) handleFiles(files);
    });
  }

  async function handleFiles(fileList) {
    if (!activeScene) { flashStatus('Pick a scene first', 'err'); return; }
    const progress = document.getElementById('upload-progress');
    const files = Array.from(fileList).filter(f => /\.(png|jpe?g|webp)$/i.test(f.name));
    if (!files.length) { flashStatus('No supported image files in drop', 'err'); return; }

    for (const f of files) {
      const safe = f.name.replace(/[^A-Za-z0-9._-]/g, '_');
      const row = document.createElement('div');
      row.className = 'pg-row';
      row.innerHTML = `<span>↑ ${escapeHtml(safe)}</span><span>${bytes(f.size)}…</span>`;
      progress.appendChild(row);
      try {
        const r = await fetch(`/upload?scene=${encodeURIComponent(activeScene)}&filename=${encodeURIComponent(safe)}`, {
          method: 'POST',
          headers: {'Content-Type': f.type || 'application/octet-stream'},
          body: f,
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        row.classList.add('ok');
        row.innerHTML = `<span>✓ ${escapeHtml(safe)}</span><span>${bytes(f.size)} uploaded</span>`;
      } catch (err) {
        row.classList.add('err');
        row.innerHTML = `<span>✗ ${escapeHtml(safe)}</span><span>${escapeHtml(String(err))}</span>`;
      }
    }
    flashStatus(`Uploaded ${files.length} file${files.length===1?'':'s'}`, 'ok');
    await loadScenes();
    // Clear progress rows after a short delay so users see them, then fade
    setTimeout(() => { if (progress) progress.innerHTML = ''; }, 4000);
  }

  // ── new scene ────────────────────────────────────────────────────
  function validSceneName(s) { return /^[A-Za-z0-9._-]+$/.test(s); }
  async function createScene() {
    const raw = newSceneIn.value.trim();
    const name = raw.replace(/\s+/g, '_');
    if (!validSceneName(name)) {
      flashStatus('Use letters, digits, _, -, . only', 'err'); return;
    }
    if (scenes.find(s => s.name === name)) {
      flashStatus('Scene already exists', 'err');
      activeScene = name; renderScenes(); renderMain(); return;
    }
    try {
      const r = await fetch(`/create-scene?name=${encodeURIComponent(name)}`, {method: 'POST'});
      if (!r.ok) throw new Error('HTTP ' + r.status);
      flashStatus('Created ' + name, 'ok');
      newSceneIn.value = '';
      activeScene = name;
      localStorage.setItem('multipano-active-scene', activeScene);
      await loadScenes();
    } catch (err) {
      flashStatus('Create failed: ' + err, 'err');
    }
  }
  newSceneBtn.addEventListener('click', createScene);
  newSceneIn.addEventListener('keydown', e => { if (e.key === 'Enter') createScene(); });

  // ── lightbox ─────────────────────────────────────────────────────
  function openLightbox(img) {
    lbImg.src = busted(img.url);
    lbMeta.textContent = `${img.filename} · ${bytes(img.size)}`;
    lightbox.classList.add('open');
  }
  function closeLightbox() { lightbox.classList.remove('open'); lbImg.src = ''; }
  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  loadScenes();
})();
</script>
</body>
</html>
