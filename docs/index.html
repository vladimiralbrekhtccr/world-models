<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>world-models · 3DGS demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  html, body { margin: 0; height: 100%; background: #000; color: #ddd;
    font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  #app { position: fixed; inset: 0; }
  #hud { position: fixed; top: 10px; left: 12px; padding: 8px 10px;
    background: rgba(0,0,0,.55); border: 1px solid #333; border-radius: 4px;
    pointer-events: none; max-width: 80vw; }
  #hud b { color: #fff; }
  #hud kbd { background: #222; border: 1px solid #444; border-radius: 3px;
    padding: 0 4px; }
  a { color: #6fa; }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <b>panorama → 3D Gaussian Splats</b> · depth-only baseline (DepthAnything-V2)<br>
  drag to look · scroll to zoom · <kbd>WASD</kbd> to move ·
  <a href="https://github.com/vladimiralbrekhtccr/world-models">repo</a>
</div>

<script type="importmap">
{
  "imports": {
    "three":                              "https://esm.sh/three@0.160.0",
    "three/addons/":                      "https://esm.sh/three@0.160.0/examples/jsm/",
    "@mkkellogg/gaussian-splats-3d":      "https://esm.sh/@mkkellogg/gaussian-splats-3d@0.4.7?deps=three@0.160.0"
  }
}
</script>

<script type="module">
import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

const viewer = new GaussianSplats3D.Viewer({
  rootElement: document.getElementById('app'),
  cameraUp:               [0, 1, 0],
  initialCameraPosition:  [0, 0, 0],
  initialCameraLookAt:    [0, 0, 1],
  sphericalHarmonicsDegree: 0,
  sharedMemoryForWorkers: false,
});

viewer.addSplatScene('scene.ply', {
  showLoadingUI: true,
  splatAlphaRemovalThreshold: 5,
}).then(() => viewer.start());
</script>
</body>
</html>
